name: Build and Release Windows

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags, e.g. v1.0.0
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run make
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coriolis-setup
          # electron-builder defaults to out/ or dist/ depending on config. We assume dist/ here based on package.json files array, or out/
          path: |
            dist/*.exe
            out/*.exe
            build/*.exe

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            out/*.exe
            build/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
